<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DFFF57"/>
      <stop offset="100%" stop-color="#b0d040"/>
    </linearGradient>
    <clipPath id="bubbleClip">
      <path d="M0,0 h40 v32 H14 l-8,8 v-8 H0 V0 Z"/>
    </clipPath>
  </defs>

  <!-- Brutalist speech bubble icon -->
  <g transform="translate(4, 24)">
    <!-- Bubble body — sharp corners, brutalist -->
    <path d="M0,0 h40 v32 H14 l-8,8 v-8 H0 V0 Z" fill="#0A0A0A"/>
    <!-- Neon accent slash inside bubble -->
    <path d="M8,8 h24 v3 H8 Z" fill="#DFFF57"/>
    <path d="M8,14 h18 v3 H8 Z" fill="#DFFF57" opacity="0.6"/>
    <path d="M8,20 h12 v3 H8 Z" fill="#DFFF57" opacity="0.3"/>
  </g>

  <!-- BELDITALK — bold slate grotesk style -->
  <text x="62" y="52" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="1" fill="#0A0A0A">
    BELDI
    <tspan fill="#DFFF57" stroke="#0A0A0A" stroke-width="0.5">TALK</tspan>
  </text>

  <!-- Tagline — uppercase, tight spacing -->
  <text x="63" y="72" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="500" letter-spacing="3" fill="#555" text-transform="uppercase">
    LEARN MOROCCAN DARIJA
  </text>

  <!-- Small accent dot -->
  <circle cx="370" cy="46" r="3" fill="#DFFF57"/>
</svg>
