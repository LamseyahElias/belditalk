<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAFAFA;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;padding:40px}
.post{width:1080px;height:1080px;background:#0A0A0A;border-radius:40px;padding:60px;display:flex;flex-direction:column;position:relative;overflow:hidden;color:#FFFFFF}
.accent-glow{position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(223,255,87,0.08) 0%,transparent 70%);pointer-events:none}
.top-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:auto}
.logo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.5px;color:#DFFF57}
.label{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.tip-icon{width:60px;height:60px;border-radius:50%;background:rgba(223,255,87,0.1);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:32px}
.tip-title{font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;line-height:1.1;letter-spacing:-0.03em;margin-bottom:24px}
.tip-body{font-size:20px;color:rgba(255,255,255,0.7);line-height:1.7;max-width:800px}
.cta-strip{display:flex;align-items:center;gap:16px;margin-top:auto;padding-top:32px;border-top:1px solid rgba(255,255,255,0.1)}
.cta-btn{padding:12px 28px;background:#DFFF57;color:#0A0A0A;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;border:none}
.cta-text{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:0.5px}
</style></head><body>
<div class="post">
  <div class="accent-glow"></div>
  <div class="top-line">
    <div class="logo">BeldiTalk ←</div>
    <div class="label">Language Tip</div>
  </div>
  <div class="tip-icon">💡</div>
  <div class="tip-title">Hamdullah vs Shukran</div>
  <div class="tip-body">In Darija use Hamdullah when asked how you are. Shukran is for thanks. Mixing them labels you as a textbook learner.</div>
  <div class="cta-strip">
    <div class="cta-btn">Start Learning →</div>
    <div class="cta-text">belditalk.com 🇲🇦</div>
  </div>
</div></body></html>
