<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAFAFA;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;padding:20px}
.post{width:1080px;height:1920px;background:#FFFFFF;border-radius:40px;padding:60px;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 32px 64px rgba(0,0,0,0.06);border:1px solid #E8E8E8}
.bg-circle{position:absolute;top:-160px;right:-160px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(223,255,87,0.1) 0%,transparent 70%);pointer-events:none}
.bg-circle2{position:absolute;bottom:-200px;left:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,230,200,0.06) 0%,transparent 70%);pointer-events:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:60px;position:relative;z-index:2}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;color:#0A0A0A}
.label{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#555;padding:6px 14px;border-radius:100px;border:1px solid #E8E8E8}
.main-content{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:2}
.main-word{font-family:'Space Grotesk',sans-serif;font-size:80px;font-weight:700;line-height:1.1;letter-spacing:-0.03em;color:#0A0A0A;margin-bottom:24px}
.main-body{font-size:28px;color:#555;line-height:1.6;max-width:800px}
.cta-area{margin-top:auto;position:relative;z-index:2;text-align:center;padding:40px 0 20px}
.cta-btn{display:inline-block;padding:18px 48px;background:#0A0A0A;color:#DFFF57;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;text-decoration:none}
.cta-sub{font-size:14px;color:#555;margin-top:16px;letter-spacing:0.5px}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid #E8E8E8;position:relative;z-index:2}
.bottom-bar span{font-size:13px;color:#555}
</style></head><body>
<div class="post">
  <div class="bg-circle"></div>
  <div class="bg-circle2"></div>
  <div class="top-bar">
    <div class="logo">BeldiTalk ←</div>
    <div class="label">Learn Darija</div>
  </div>
  <div class="main-content">
    <div class="main-word">Salam</div>
    <div class="main-body">That is Hello in Darija. The first of 1000+ words you will learn. Start speaking Moroccan from day one.</div>
  </div>
  <div class="cta-area">
    <div class="cta-btn">Start Learning →</div>
    <div class="cta-sub">belditalk.com 🇲🇦</div>
  </div>
  <div class="bottom-bar">
    <span>#LearnDarija</span>
    <span>#Morocco</span>
    <span>#BeldiTalk</span>
  </div>
</div></body></html>
